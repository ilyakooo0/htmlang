name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        # Version must match the wasm-bindgen dep in crates/htmlang-wasm/Cargo.toml
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Build htmlang-wasm
        run: cargo build --release --target wasm32-unknown-unknown -p htmlang-wasm

      - name: Generate wasm bindings
        run: |
          wasm-bindgen --target no-modules --no-typescript \
            --out-dir target/wasm-pkg \
            target/wasm32-unknown-unknown/release/htmlang_wasm.wasm

      - name: Build htmlang CLI
        run: cargo build --release --bin htmlang

      - name: Generate playground HTML
        run: |
          mkdir -p dist
          ./target/release/htmlang playground dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
