name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: htmlang-linux-x86_64
            lsp_name: htmlang-lsp-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: htmlang-macos-x86_64
            lsp_name: htmlang-lsp-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: htmlang-macos-aarch64
            lsp_name: htmlang-lsp-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: htmlang-windows-x86_64.exe
            lsp_name: htmlang-lsp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          for bin in htmlang htmlang-lsp; do
            if [ -f target/${{ matrix.target }}/release/$bin ]; then
              strip target/${{ matrix.target }}/release/$bin
            fi
          done

      - name: Upload htmlang
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: target/${{ matrix.target }}/release/htmlang${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Upload htmlang-lsp
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lsp_name }}
          path: target/${{ matrix.target }}/release/htmlang-lsp${{ runner.os == 'Windows' && '.exe' || '' }}

  vscode:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension
        working-directory: editors/vscode
        run: |
          npm ci
          npm run build
          npx @vscode/vsce package -o htmlang.vsix

      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: htmlang.vsix
          path: editors/vscode/htmlang.vsix

  release:
    name: Create Release
    needs: [build, vscode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate version
        id: version
        run: |
          VERSION=$(date -u +'%Y.%m.%d.%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            filename=$(basename "$dir")
            file=$(find "$dir" -type f | head -1)
            if [ -n "$file" ]; then
              cp "$file" "release/$filename"
            fi
          done
          chmod +x release/htmlang-* 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
