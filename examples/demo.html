*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }

._11{font-weight:bold;}

._13:active{background:#1d4ed8;}
._14{color:white;font-weight:bold;}
._15{display:flex;flex-direction:column;flex:1;min-width:0;}
._16{color:#888;}
</style>
</head>

<div class="_10"><span class="_11">Minimal</span>
